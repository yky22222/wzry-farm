<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>王者种菜计算器</title>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #f4f7f9; color: #333; max-width: 500px; margin: 0 auto; padding: 15px; }
        .card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .tabs { display: flex; background: #eee; border-radius: 8px; padding: 4px; margin-bottom: 20px; }
        .tab { flex: 1; text-align: center; padding: 10px; cursor: pointer; border-radius: 6px; font-size: 14px; transition: 0.2s; }
        .tab.active { background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); font-weight: bold; color: #3498db; }
        .content { display: none; }
        .content.active { display: block; }
        .form-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 5px; font-size: 13px; color: #666; }
        select, input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; background: #3498db; color: white; border: none; padding: 14px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        button:active { transform: scale(0.98); }
        .result { margin-top: 15px; padding: 15px; background: #f0f9ff; border-radius: 10px; border-left: 5px solid #3498db; font-size: 14px; line-height: 1.6; white-space: pre-line; }
        .time-badge { color: #e67e22; font-weight: bold; }
        
        /* 升级界面专用样式 */
        .upgrade-grid { display: flex; gap: 15px; margin-bottom: 20px; }
        .grid-col { flex: 1; background: #fcfcfc; padding: 12px; border-radius: 10px; border: 1px solid #eee; }
        .grid-title { font-size: 14px; font-weight: bold; color: #34495e; margin-bottom: 15px; text-align: center; border-bottom: 2px solid #3498db; padding-bottom: 5px; display: inline-block; margin-left: auto; margin-right: auto; width: fit-content; }
        .input-mini { text-align: center; font-weight: bold; color: #d35400; background: #fdf2e9; border: 1px solid #e67e22; }
        .select-mini { background: #f0f8ff; border: 1px solid #3498db; color: #2c3e50; font-weight: bold; }
        
        .cost-panel { background: #f8f9fa; border-radius: 12px; padding: 15px; margin-bottom: 20px; }
        .cost-title { text-align: center; font-size: 16px; font-weight: bold; margin-bottom: 15px; color: #2c3e50; }
        .cost-item { display: flex; justify-content: space-between; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px dashed #dcdde1; font-size: 14px; }
        .cost-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .val-coin { color: #16a085; font-weight: bold; }
        .val-xp { color: #f39c12; font-weight: bold; }
        .summary-row { display: flex; justify-content: space-between; text-align: center; gap: 10px; }
        .summary-box { flex: 1; }
        .summary-label { color: #c0392b; font-weight: bold; font-size: 13px; margin-bottom: 6px; }
        .summary-val { background: #f1c40f; color: #fff; padding: 10px 5px; border-radius: 8px; font-size: 16px; font-weight: bold; box-shadow: 0 2px 5px rgba(241,196,15,0.3); }
    </style>
</head>
<body>

    <div class="card">
        <div class="tabs">
            <div class="tab active" onclick="switchTab(1)">浇水排班</div>
            <div class="tab" onclick="switchTab(2)">成熟预测</div>
            <div class="tab" onclick="switchTab(3)">升级资料</div>
        </div>

        <div id="tab1" class="content active">
            <div class="form-group">
                <label>作物类型</label>
                <select id="crop1" onchange="saveData()">
                    <option value="1">1小时</option>
                    <option value="8">8小时</option>
                    <option value="16">16小时</option>
                    <option value="32">32小时</option>
                </select>
            </div>
            <div class="form-group">
                <label>种下时间</label>
                <input type="time" id="plantTime" onchange="saveData()">
            </div>
            <button onclick="calc1()">生成时间表</button>
            <div id="res1" class="result" style="display:none;"></div>
        </div>

        <div id="tab2" class="content">
            <div class="form-group">
                <label>作物类型</label>
                <select id="crop2" onchange="saveData()">
                    <option value="1">1小时</option>
                    <option value="8">8小时</option>
                    <option value="16">16小时</option>
                    <option value="32">32小时</option>
                </select>
            </div>
            <div class="form-group">
                <label>当前时间 (自动获取)</label>
                <input type="time" id="currTime" readonly>
            </div>
            <div class="form-group" style="display: flex; gap: 10px;">
                <div style="flex:1;">
                    <label>剩余成熟</label>
                    <div style="display:flex;gap:5px;"><input type="number" id="remH" placeholder="时" oninput="saveData()"><input type="number" id="remM" placeholder="分" oninput="saveData()"></div>
                </div>
                <div style="flex:1;">
                    <label>水分维持</label>
                    <div style="display:flex;gap:5px;"><input type="number" id="watH" placeholder="时" oninput="saveData()"><input type="number" id="watM" placeholder="分" oninput="saveData()"></div>
                </div>
            </div>
            <button onclick="calc2()">开始预测</button>
            <div id="res2" class="result" style="display:none;"></div>
        </div>

        <div id="tab3" class="content">
            <div class="upgrade-grid">
                <div class="grid-col">
                    <div class="grid-title">当前状况</div>
                    <div class="form-group">
                        <label>农场等级 (1-40)</label>
                        <input type="number" class="input-mini" id="currLvl" value="6" onchange="triggerLogicUpdate()">
                    </div>
                    <div class="form-group">
                        <label>当前小摊 (0-19)</label>
                        <input type="number" class="input-mini" id="currStall" value="2" onchange="triggerLogicUpdate()">
                    </div>
                    <div class="form-group">
                        <label>地块数量 (3-23)</label>
                        <input type="number" class="input-mini" id="currLand" value="6" onchange="triggerLogicUpdate()">
                    </div>
                </div>

                <div class="grid-col">
                    <div class="grid-title">目标规划</div>
                    <div class="form-group">
                        <label>升至等级 (2-40)</label>
                        <input type="number" class="input-mini" style="border-color:#3498db; color:#2980b9;" id="targetLvl" value="7" onchange="triggerLogicUpdate()">
                    </div>
                    <div class="form-group">
                        <label>升至小摊</label>
                        <select class="select-mini" id="targetStall" onchange="calcUpgrade()"></select>
                    </div>
                    <div class="form-group">
                        <label>开至地块</label>
                        <select class="select-mini" id="targetLand" onchange="calcUpgrade()"></select>
                    </div>
                </div>
            </div>

            <div class="cost-panel">
                <div class="cost-title">升级花费明细</div>
                <div class="cost-item">
                    <span>农场升级经验</span>
                    <span class="val-xp" id="upgReqXp">720</span>
                </div>
                <div class="cost-item">
                    <span>农场升级金币</span>
                    <span class="val-coin" id="upgBaseCoin">2100</span>
                </div>
                <div class="cost-item">
                    <span>小摊金币 / 经验</span>
                    <span>
                        <span class="val-coin" id="upgStallCoin">3000</span> / 
                        <span class="val-xp" id="upgStallXp">360</span>
                    </span>
                </div>
                <div class="cost-item">
                    <span>开地金币 / 经验</span>
                    <span>
                        <span class="val-coin" id="upgLandCoin">0</span> / 
                        <span class="val-xp" id="upgLandXp">0</span>
                    </span>
                </div>
            </div>

            <div class="summary-row">
                <div class="summary-box">
                    <div class="summary-label">合计需要金币</div>
                    <div class="summary-val" id="upgTotalCoin">5100</div>
                </div>
                <div class="summary-box">
                    <div class="summary-label">合计获得经验</div>
                    <div class="summary-val" id="upgTotalXp">360</div>
                </div>
            </div>
        </div>
    </div>

<script>
    // --- 数据库 ---
    const baseLvlData = {
        2: { xp: 5, coin: 12 }, 3: { xp: 36, coin: 50 }, 4: { xp: 60, coin: 100 }, 5: { xp: 100, coin: 150 }, 6: { xp: 360, coin: 480 },
        7: { xp: 720, coin: 2100 }, 8: { xp: 1100, coin: 5000 }, 9: { xp: 2200, coin: 13000 }, 10: { xp: 3500, coin: 25000 },
        11: { xp: 5000, coin: 45000 }, 12: { xp: 7500, coin: 86000 }, 13: { xp: 10000, coin: 109000 }, 14: { xp: 12500, coin: 132000 },
        15: { xp: 15000, coin: 154000 }, 16: { xp: 17500, coin: 179000 }, 17: { xp: 20000, coin: 204000 }, 18: { xp: 23500, coin: 236000 },
        19: { xp: 27000, coin: 268000 }, 20: { xp: 30500, coin: 303000 }, 21: { xp: 34000, coin: 336000 }, 22: { xp: 37500, coin: 375000 },
        23: { xp: 42000, coin: 413000 }, 24: { xp: 46500, coin: 452000 }, 25: { xp: 51000, coin: 493000 }, 26: { xp: 55500, coin: 536000 },
        27: { xp: 60000, coin: 593000 }, 28: { xp: 70000, coin: 675000 }, 29: { xp: 80000, coin: 762000 }, 30: { xp: 90000, coin: 859000 },
        31: { xp: 100000, coin: 975000 }, 32: { xp: 110000, coin: 1100000 }, 33: { xp: 120000, coin: 1240000 }, 34: { xp: 130000, coin: 1400000 },
        35: { xp: 140000, coin: 1580000 }, 36: { xp: 160000, coin: 1780000 }, 37: { xp: 180000, coin: 2000000 }, 38: { xp: 200000, coin: 2270000 },
        39: { xp: 220000, coin: 2550000 }, 40: { xp: 240000, coin: 2820000 }
    };

    const landData = {
        4: { coin: 10, xp: 20 }, 5: { coin: 100, xp: 50 }, 6: { coin: 1000, xp: 160 }, 7: { coin: 8000, xp: 500 }, 8: { coin: 16000, xp: 1000 },
        9: { coin: 78000, xp: 3000 }, 10: { coin: 130000, xp: 6000 }, 11: { coin: 190000, xp: 9000 }, 12: { coin: 270000, xp: 12000 },
        13: { coin: 390000, xp: 15000 }, 14: { coin: 530000, xp: 18000 }, 15: { coin: 700000, xp: 21000 }, 16: { coin: 900000, xp: 25000 },
        17: { coin: 1250000, xp: 30000 }, 18: { coin: 1750000, xp: 37000 }, 19: { coin: 2390000, xp: 45000 }, 20: { coin: 3170000, xp: 56000 },
        21: { coin: 4100000, xp: 67000 }, 22: { coin: 5230000, xp: 78000 }, 23: { coin: 0, xp: 0 }
    };

    const stallData = {
        1: { coin: 0, xp: 0 }, 2: { coin: 1000, xp: 150 }, 3: { coin: 3000, xp: 360 }, 4: { coin: 10000, xp: 720 }, 5: { coin: 54000, xp: 1500 },
        6: { coin: 112000, xp: 3000 }, 7: { coin: 178000, xp: 4500 }, 8: { coin: 256000, xp: 7140 }, 9: { coin: 344000, xp: 9720 },
        10: { coin: 443000, xp: 12000 }, 11: { coin: 562000, xp: 15000 }, 12: { coin: 693000, xp: 18000 }, 13: { coin: 861000, xp: 22000 },
        14: { coin: 1149000, xp: 26000 }, 15: { coin: 1520000, xp: 32000 }, 16: { coin: 1977000, xp: 40000 }, 17: { coin: 2538000, xp: 49000 },
        18: { coin: 3196000, xp: 59000 }, 19: { coin: 0, xp: 0 }
    };

    function getMaxLand(lv) { return lv < 2 ? 3 : Math.min(23, Math.floor(lv / 2) + 3); }
    function getMaxStall(lv) {
        if (lv < 5) return 0;
        if (lv === 5) return 1;
        if (lv === 6) return 2;
        return Math.min(19, Math.floor((lv - 1) / 2));
    }

    // --- 基础运转逻辑 ---
    window.onload = function() {
        const saved = JSON.parse(localStorage.getItem('farmData') || '{}');
        ['crop1','plantTime','crop2','remH','remM','watH','watM','currLvl','targetLvl','currStall','currLand'].forEach(id => {
            if(saved[id] !== undefined) document.getElementById(id).value = saved[id];
        });
        if(saved.res1) { document.getElementById('res1').innerHTML = saved.res1; document.getElementById('res1').style.display = 'block'; }
        if(saved.res2) { document.getElementById('res2').innerHTML = saved.res2; document.getElementById('res2').style.display = 'block'; }
        
        updateCurrTime();
        triggerLogicUpdate(saved.targetStall, saved.targetLand);
    };

    function saveData() {
        let data = {};
        ['crop1','plantTime','crop2','remH','remM','watH','watM','currLvl','targetLvl','currStall','currLand','targetStall','targetLand'].forEach(id => {
            let el = document.getElementById(id);
            if(el) data[id] = el.value;
        });
        data.res1 = document.getElementById('res1').innerHTML;
        data.res2 = document.getElementById('res2').innerHTML;
        localStorage.setItem('farmData', JSON.stringify(data));
    }

    function switchTab(n) {
        document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === n-1));
        document.querySelectorAll('.content').forEach((c, i) => c.classList.toggle('active', i === n-1));
        if(n === 2) updateCurrTime();
    }
    
    function updateCurrTime() { document.getElementById('currTime').value = new Date().toTimeString().slice(0,5); }
    function addMins(t, m) { let [h, min] = t.split(':').map(Number); return new Date(2000,0,1,h,Math.round(min + m)).toTimeString().slice(0,5); }
    function formatM(m) { return Math.round(m) + "分钟"; }
    function formatNum(num) { return num >= 10000 ? parseFloat((num / 10000).toFixed(2)) + 'w' : num; }

    // --- 功能一：浇水排班计算逻辑 ---
    function calc1() {
        let baseMins = document.getElementById('crop1').value * 60;
        let pTime = document.getElementById('plantTime').value;
        if(!pTime) return alert("请选择种下时间");
        let maxMoisture = baseMins / 3;
        let minWait = maxMoisture / 10;
        let rem = baseMins;
        let cur = pTime;
        let log = `<b>浇水排班表：</b>\n`;
        rem -= (maxMoisture/4);
        log += `1. 初始浇水：${cur} (减免 ${maxMoisture/4}分)\n`;
        let i = 2;
        while(rem > 0.5) {
            if(rem > 1.25 * maxMoisture) {
                cur = addMins(cur, maxMoisture);
                rem -= 1.25 * maxMoisture;
                log += `${i}. 再次浇水：${cur} (等待${formatM(maxMoisture)}，减免${maxMoisture/4}分)\n`;
            } else {
                let idealW = rem / 1.25;
                if(idealW >= minWait) {
                    cur = addMins(cur, idealW);
                    log += `🏁 最终成熟：<span class="time-badge">${cur}</span> (等待${formatM(idealW)}，浇水后刚好成熟)\n`;
                } else {
                    let finalWait = Math.min(rem, minWait);
                    cur = addMins(cur, finalWait);
                    if(rem <= minWait) {
                        log += `🏁 最终成熟：<span class="time-badge">${cur}</span> (等待${formatM(finalWait)}自然成熟，流失未达下限无需浇水)\n`;
                    } else {
                        log += `🏁 最终成熟：<span class="time-badge">${cur}</span> (死等${formatM(finalWait)}触发1/10流失下限，浇水瞬间成熟)\n`;
                    }
                }
                break;
            }
            i++;
        }
        document.getElementById('res1').innerHTML = log;
        document.getElementById('res1').style.display = 'block';
        saveData();
    }

    // --- 功能二：成熟预测计算逻辑 ---
    function calc2() {
        updateCurrTime();
        let baseMins = document.getElementById('crop2').value * 60;
        let remTotal = (Number(document.getElementById('remH').value)||0)*60 + (Number(document.getElementById('remM').value)||0);
        let watLeft = (Number(document.getElementById('watH').value)||0)*60 + (Number(document.getElementById('watM').value)||0);
        let maxM = baseMins / 3;
        let minWait = maxM / 10;
        let lost = maxM - watLeft;
        let idealW = (remTotal - lost / 4) / 1.25;
        let realWait;
        let canWaterNow = lost >= minWait;
        let immReduct = canWaterNow ? (lost / 4) : 0;
        if (idealW >= minWait - lost) { realWait = idealW; } 
        else { realWait = Math.min(remTotal, minWait - lost); }
        let final = addMins(document.getElementById('currTime').value, realWait);
        let log = `<b>预测结果：</b>\n`;
        if(canWaterNow) { log += `✅ 当前流失已超1/10，立刻浇水可减免：${Math.round(immReduct)} 分钟\n`; } 
        else { log += `⚠️ 当前水分流失未达1/10，无法立即浇水\n`; }
        log += `后续需现实等待：${Math.round(realWait)} 分钟\n`;
        log += `最快成熟时刻：<span class="time-badge">${final}</span>`;
        document.getElementById('res2').innerHTML = log;
        document.getElementById('res2').style.display = 'block';
        saveData();
    }

    // --- 功能三：升级逻辑控制 ---
    function triggerLogicUpdate(savedTargetStall, savedTargetLand) {
        let cLvl = Math.max(1, Math.min(40, parseInt(document.getElementById('currLvl').value) || 1));
        let tLvl = Math.max(cLvl, Math.min(40, parseInt(document.getElementById('targetLvl').value) || 2));
        
        let maxCStall = getMaxStall(cLvl);
        let cStall = Math.max(0, Math.min(maxCStall, parseInt(document.getElementById('currStall').value) || 0));
        
        let maxCLand = getMaxLand(cLvl);
        let cLand = Math.max(3, Math.min(maxCLand, parseInt(document.getElementById('currLand').value) || 3));

        document.getElementById('currLvl').value = cLvl;
        document.getElementById('targetLvl').value = tLvl;
        document.getElementById('currStall').value = cStall;
        document.getElementById('currLand').value = cLand;

        let maxTStall = getMaxStall(tLvl);
        let maxTLand = getMaxLand(tLvl);

        let stallHTML = `<option value="auto">Auto (随等级升至${maxTStall})</option>`;
        for(let i = cStall; i <= maxTStall; i++) { stallHTML += `<option value="${i}">升至 ${i} 级${i===cStall?' (不升)':''}</option>`; }
        document.getElementById('targetStall').innerHTML = stallHTML;

        let landHTML = `<option value="auto">Auto (随等级开至${maxTLand})</option>`;
        for(let i = cLand; i <= maxTLand; i++) { landHTML += `<option value="${i}">开至 ${i} 块${i===cLand?' (不开)':''}</option>`; }
        document.getElementById('targetLand').innerHTML = landHTML;

        if (savedTargetStall) document.getElementById('targetStall').value = savedTargetStall;
        if (savedTargetLand) document.getElementById('targetLand').value = savedTargetLand;

        calcUpgrade();
    }

    function calcUpgrade() {
        saveData(); 

        let cLvl = parseInt(document.getElementById('currLvl').value);
        let tLvl = parseInt(document.getElementById('targetLvl').value);
        let cStall = parseInt(document.getElementById('currStall').value);
        let cLand = parseInt(document.getElementById('currLand').value);

        let selStall = document.getElementById('targetStall').value;
        let tStall = selStall === 'auto' ? getMaxStall(tLvl) : parseInt(selStall);

        let selLand = document.getElementById('targetLand').value;
        let tLand = selLand === 'auto' ? getMaxLand(tLvl) : parseInt(selLand);

        let s_reqXp = 0, s_baseCoin = 0, s_stallCoin = 0, s_stallXp = 0, s_landCoin = 0, s_landXp = 0;

        for(let i = cLvl + 1; i <= tLvl; i++) {
            let d = baseLvlData[i] || { xp: 0, coin: 0 };
            s_reqXp += d.xp;
            s_baseCoin += d.coin;
        }

        for(let i = cStall + 1; i <= tStall; i++) {
            let d = stallData[i] || { xp: 0, coin: 0 };
            s_stallXp += d.xp;
            s_stallCoin += d.coin;
        }

        for(let i = cLand + 1; i <= tLand; i++) {
            let d = landData[i] || { xp: 0, coin: 0 };
            s_landXp += d.xp;
            s_landCoin += d.coin;
        }

        document.getElementById('upgReqXp').innerText = formatNum(s_reqXp);
        document.getElementById('upgBaseCoin').innerText = formatNum(s_baseCoin);
        document.getElementById('upgStallCoin').innerText = formatNum(s_stallCoin);
        document.getElementById('upgStallXp').innerText = formatNum(s_stallXp);
        document.getElementById('upgLandCoin').innerText = formatNum(s_landCoin);
        document.getElementById('upgLandXp').innerText = formatNum(s_landXp);

        document.getElementById('upgTotalCoin').innerText = formatNum(s_baseCoin + s_stallCoin + s_landCoin);
        document.getElementById('upgTotalXp').innerText = formatNum(s_stallXp + s_landXp);
    }
</script>
</body>
</html>
